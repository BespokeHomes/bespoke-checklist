    }
    let html='';
    flatResults.forEach((data,ri)=>{const _pp=data.num.split('-');const dUrl=_pp.length===3?'https://www.ladbsservices2.lacity.org/OnlineServices/PermitReport/PcisPermitDetail?id1='+_pp[0]+'&id2='+_pp[1]+'&id3='+_pp[2]:'';const s2=(data.currentStatus||'').toLowerCase();const isFinal=s2.includes('final')||s2.includes('issued');const isPending=s2.includes('pending')||s2.includes('correction');const statusBg=isFinal?'var(--grb)':isPending?'var(--abb)':'var(--blb)';const statusClr=isFinal?'var(--grt)':isPending?'var(--amb)':'var(--blu)';const statusBdr=isFinal?'var(--grn)':isPending?'var(--amb)':'var(--blu)';const cid='pc-card-'+ri;
      html+=`<div style="border:1px solid var(--brd);border-radius:6px;overflow:hidden;margin-bottom:14px"><div style="background:rgba(184,135,42,0.12);border-bottom:1px solid rgba(184,135,42,0.25);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="togPCCard('${cid}')"><div><div style="font-size:13px;font-weight:600;color:var(--drk)">${data.label||'Permit'} — ${data.num}</div>${data.workDescription?`<div style="font-size:10px;color:var(--mut);margin-top:2px">${data.workDescription.substring(0,70)}</div>`:''}</div><div style="display:flex;align-items:center;gap:8px">${dUrl?`<a href="${dUrl}" target="_blank" onclick="event.stopPropagation()" style="font-size:10px;color:var(--gld);border:1px solid var(--gld);padding:3px 8px;border-radius:3px;text-decoration:none;white-space:nowrap">View ↗</a>`:''}<span id="${cid}-arrow" style="font-size:11px;color:var(--gld)">▶</span></div></div>`;
      if(data.error){html+=`<div id="${cid}" style="display:none;padding:12px 16px;color:var(--rdt);font-size:12px">Could not load: ${data.error}</div></div>`;return;}
      html+=`<div id="${cid}" style="display:none">`;
      if(data.currentStatus){html+=`<div style="padding:8px 16px;border-bottom:1px solid var(--brl);display:flex;align-items:center;gap:8px"><span style="font-size:11px;font-weight:600;color:${statusClr};border:1px solid ${statusBdr};padding:3px 12px;border-radius:10px;background:${statusBg};white-space:nowrap">${data.currentStatus}</span>${data.cofoStatus?`<span style="font-size:11px;color:var(--mut)">C of O: <strong>${data.cofoStatus}</strong></span>`:''}</div>`;}
      if(data.planCheck&&data.planCheck.length>0){html+=`<div style="padding:14px 16px"><div style="font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--mut);font-weight:600;margin-bottom:12px">Plan Check History</div><div style="position:relative;padding-left:22px">`;data.planCheck.forEach((row,i)=>{const s=row.status.toLowerCase();const dot=s.includes('approved')||s.includes('issued')?'var(--grn)':s.includes('correction')?'var(--amb)':'var(--blu)';const isLast=i===data.planCheck.length-1;html+=`<div style="position:relative;padding-bottom:${isLast?0:12}px"><div style="position:absolute;left:-22px;top:3px;width:10px;height:10px;border-radius:50%;background:${dot}"></div>${!isLast?'<div style="position:absolute;left:-17px;top:13px;bottom:0;width:1px;background:var(--brl)"></div>':''}<div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap"><span style="font-size:13px;font-weight:500;color:var(--drk)">${row.status}</span>${row.date?`<span style="font-size:10px;color:var(--mut)">${row.date}</span>`:''} ${row.person?`<span style="font-size:10px;color:var(--mut)">${row.person}</span>`:''}</div></div>`;});html+=`</div></div>`;}
      if(data.clearances&&data.clearances.length>0){const cleared=data.clearances.filter(c=>c.status.toLowerCase().includes('clear')).length;const pct=Math.round(cleared/data.clearances.length*100);html+=`<div style="padding:9px 16px;border-top:1px solid var(--brl);display:flex;align-items:center;gap:10px"><span style="font-size:11px;color:var(--mid);white-space:nowrap">Clearances</span><div style="flex:1;height:4px;background:var(--brl);border-radius:2px"><div style="height:100%;width:${pct}%;background:var(--grn);border-radius:2px"></div></div><span style="font-size:11px;font-weight:600;color:var(--grt);white-space:nowrap">${cleared}/${data.clearances.length}</span></div>`;}
      html+=`</div></div>`;
    });
    html+=`<div style="font-size:10px;color:var(--mut);margin-top:6px;text-align:right">Synced ${new Date().toLocaleTimeString()}</div>`;
    content.innerHTML=html;updProg();
  }catch(e){content.innerHTML=`<div style="color:var(--rdt);text-align:center;padding:12px">Error: ${e.message}</div>`;}
  finally{btn.textContent='🔄 Refresh';btn.disabled=false;}
}
function phaseKey(phase,type){return'phase_'+type+'|'+phase;}
function getPhaseDate(phase,type){const k=phaseKey(phase,type);return st.taskCache[st.proj?.id]?.[k]?.date_completed||null;}
async function setPhaseDate(phase,type,dateStr){if(!st.proj||!dateStr)return;const k=phaseKey(phase,type);await upsertTask(st.proj.id,k,{date_completed:dateStr,status:type,note:phase});toast(type==='start'?'Phase started':'Phase completed');const tPanel=document.getElementById('timeline-panel');if(tPanel&&tPanel.style.display!=='none'){tPanel.outerHTML=renderTimeline();togTimeline();}if(type==='complete')sendAlert(phase+' phase','Construction',true);}
async function clearPhaseDate(phase,type){if(!st.proj)return;const k=phaseKey(phase,type);if(st.taskCache[st.proj.id]?.[k]){await sb.from('bh_tasks').delete().eq('project_id',st.proj.id).eq('task_key',k);delete st.taskCache[st.proj.id][k];}toast('Date cleared');const tPanel=document.getElementById('timeline-panel');if(tPanel&&tPanel.style.display!=='none'){tPanel.outerHTML=renderTimeline();togTimeline();}}
function daysBetween(d1,d2){return Math.round((new Date(d2)-new Date(d1))/(1000*60*60*24));}
function daysFromToday(d1){return daysBetween(d1,new Date().toISOString().split('T')[0]);}
async function sendAlert(item,tab,isPhase=false){if(!st.proj)return;if('Notification' in window&&Notification.permission==='granted'){const title=isPhase?`✅ ${item} Complete`:`✅ ${tab} Complete`;const body=`${st.proj.name}${st.proj.address?' · '+st.proj.address:''} — ${st.user.name}`;try{new Notification(title,{body});}catch(e){}}try{await fetch('/api/send-alert',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({project:st.proj.name,address:st.proj.address||'',tab,item,isPhase,completedBy:st.user.name,timestamp:new Date().toLocaleString()})});}catch(e){console.log('Alert send failed:',e.message);}}
async function requestNotifPermission(){if('Notification' in window&&Notification.permission==='default'){const p=await Notification.requestPermission();if(p==='granted')toast('🔔 Push notifications enabled!');}}
async function checkTabComplete(tab){const{done,total}=countTab(tab);if(total>0&&done===total){await sendAlert(tab+' checklist',tab,false);toast('✉️ Alert sent — '+tab+' complete!',3000);}}
function togPCCard(id){const el=document.getElementById(id);const arrow=document.getElementById(id+'-arrow');if(!el)return;const open=el.style.display!=='none';el.style.display=open?'none':'block';if(arrow)arrow.textContent=open?'▶':'▼';}
function getPermits(proj){if(!proj?.permit_number)return[];return proj.permit_number.split('||').filter(Boolean).map(p=>{const pp=p.split(':');return pp.length===2?{label:pp[0],num:pp[1]}:{label:'',num:p};}).filter(p=>p.num);}
function closeM(){const b=$('mbg');if(b)b.classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});
(async()=>{$('app').innerHTML=`<div class="lp"><div style="color:rgba(250,250,247,0.4);font-size:12px;letter-spacing:0.1em">Loading...</div></div>`;render();})();
</script>
