function toast(msg,dur=2500){const t=$('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),dur);}
function fd(){return new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function addLog(action,detail,projId){sb.from('bh_activity').insert({project_id:projId||st.proj?.id,user_initials:st.user.initials,user_name:st.user.name,action,detail}).then(()=>{});}
function isComplete(tab,idx){
  const item=DATA[tab][idx];const k=tab+'|'+idx;const t=st.taskCache[st.proj?.id]?.[k];if(!t)return false;
  if(item.mode==='checkbox')return!!t.checked;
  if(item.mode==='construction'){
    if(item.o==='g')return false;
    if(item.o==='i')return tab==='Inspections'?t.status==='passed':false;
    return t.status==='complete';
  }
  if(item.mode==='permits')return t.status==='completed';
  return t.status==='complete'||t.status==='completed';
}
function countTab(tab){
  const items=DATA[tab];let done=0,total=0;
  if(tab==='Inspections')return{done:0,total:0};
  items.forEach((item,idx)=>{
    if(item.mode==='construction'&&item.o==='g')return;
    total++;if(isComplete(tab,idx))done++;
  });
  return{done,total};
}
async function loadProjects(){const{data,error}=await sb.from('bh_projects').select('*').order('created_at',{ascending:false});if(error)return[];st.projects=data||[];}
async function loadTasks(projId){if(!projId)return;if(st.taskCache[projId])return;const{data}=await sb.from('bh_tasks').select('*').eq('project_id',projId);const map={};(data||[]).forEach(t=>map[t.task_key]=t);st.taskCache[projId]=map;}
async function upsertTask(projId,taskKey,updates){const existing=st.taskCache[projId]?.[taskKey];const row={project_id:projId,task_key:taskKey,updated_by:st.user.initials,updated_by_name:st.user.name,updated_at:new Date().toISOString(),...updates};if(existing){await sb.from('bh_tasks').update(row).eq('project_id',projId).eq('task_key',taskKey);}else{await sb.from('bh_tasks').insert(row);}if(!st.taskCache[projId])st.taskCache[projId]={};st.taskCache[projId][taskKey]={...existing,...row};}
function exportProject(){
  if(!st.proj)return;
  const wb=XLSX.utils.book_new();
  TABS.forEach(tab=>{
    const items=DATA[tab];const rows=[['Task','Status/Checked','Note','Date','Updated By']];
    items.forEach((item,idx)=>{const k=tab+'|'+idx;const t=st.taskCache[st.proj.id]?.[k]||{};rows.push([item.t,item.mode==='checkbox'?(t.checked?'✓':''):(t.status||''),t.note||'',t.date_completed||'',t.updated_by_name||'']);});
    const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:45},{wch:15},{wch:35},{wch:12},{wch:18}];XLSX.utils.book_append_sheet(wb,ws,tab.substring(0,31));
  });
  XLSX.writeFile(wb,`${st.proj.name.replace(/[^a-z0-9]/gi,'_')}_Checklist.xlsx`);toast('Downloaded!');
}

        <div>

      h+=`<div class="tb2"><div class="tt">${item.t}</div>${item.h?`<div class="th">${item.h}</div>`:''}<div class="stamp" id="st${item.idx}" style="${showStamp?'display:flex':'display:none'}">${showStamp?`<span class="stav">${t.updated_by}</span><span class="stnm">${t.updated_by_name||t.updated_by}</span><span class="stdt">· ${t.date_completed||fd()}</span><span class="stpill ${t.checked?'checked':sv}">${t.checked?'checked':sv.replace(/-/g,' ')}</span>`:''}</div><div class="na${hasN?' open':''}" id="na${item.idx}"><textarea class="nta" placeholder="Add a note..." onchange="saveNote('${tab}',${item.idx},this.value)">${t.note||''}</textarea></div></div><div class="tc">`;
      if(mode==='checkbox'&&item.hasDate){h+=`<input type="date" class="date-inp" value="${t.date_completed||''}" onchange="saveDate('${tab}',${item.idx},this.value)" title="Date completed">`;}
      if(!isGC){h+=`<button class="nb${hasN?' on':''}" onclick="togN(${item.idx})" id="nb${item.idx}">${hasN?'📝':'+ Note'}</button>`;}
      h+=`</div></div>`;
    });
  });
  return h;
}
function rAdmin(){
  $('app').innerHTML=`${navH()}<div class="layout"><div class="sidebar"><div class="sb-lbl">Navigation</div><button class="tb" onclick="st.view='main';rMain()">← Back</button></div><div class="main"><div class="aw"><div class="at">Admin Panel</div><div class="asub">Signed in as ${st.user.name}.</div><div class="sh2">Team Members</div>${st.users.map(u=>`<div class="uc"><div class="uav">${u.initials}</div><div class="ui"><div class="un">${u.name}</div><div class="um">Initials: ${u.initials}</div></div>${u.role==='admin'?'<span class="urb">Admin</span>':''}<button class="brs" onclick="showReset('${u.id}')">Reset Password</button></div>`).join('')}<div class="sh2">Recent Activity</div><div id="actlog"><div style="color:var(--mut);font-size:11px">Loading...</div></div></div></div></div><div class="mbg" id="mbg" onclick="if(event.target===this)closeM()"><div class="mc" id="mcc"></div></div>`;
  sb.from('bh_activity').select('*').order('created_at',{ascending:false}).limit(50).then(({data})=>{const el=$('actlog');if(!el)return;if(!data||!data.length){el.innerHTML='<div style="color:var(--mut);font-size:11px;padding:8px 0">No activity yet.</div>';return;}el.innerHTML=data.map(a=>`<div class="ar"><div class="aav">${a.user_initials}</div><div class="at2"><strong>${a.user_name}</strong> — ${a.detail}</div><div class="ad">${new Date(a.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div></div>`).join('');});
}
function showReset(uid){const u=st.users.find(x=>x.id===uid);if(!u)return;$('mbg').classList.add('open');$('mcc').innerHTML=`<div class="mt">Reset Password</div><div class="ms">New password for ${u.name}.</div><div class="fg"><label class="fl">New Password</label><input class="fi" type="password" id="np"/></div><div class="fg"><label class="fl">Confirm</label><input class="fi" type="password" id="cp"/></div><div style="color:var(--rdt);font-size:10.5px;min-height:13px;margin-bottom:3px" id="pe"></div><div class="ma"><button class="bc" onclick="closeM()">Cancel</button><button class="bp" onclick="doReset('${uid}')">Save</button></div>`;}
function doReset(uid){const np=$('np').value,cp=$('cp').value;if(!np){$('pe').textContent='Enter a password.';return;}if(np!==cp){$('pe').textContent='Passwords do not match.';return;}const u=st.users.find(x=>x.id===uid);if(u){u.password=np;toast('Password updated');}closeM();}
function openNew(){$('mbg').classList.add('open');$('mcc').innerHTML=`<div class="mt">New Project</div><div class="ms">Each project has its own independent checklist.</div><div class="fg"><label class="fl">Project Name</label><input class="fi" type="text" id="pn" placeholder="e.g. 123 Maple Street"/></div><div class="fg"><label class="fl">Address</label><input class="fi" type="text" id="pa" placeholder="Full address"/></div><div class="fg"><label class="fl">Project Type</label><input class="fi" type="text" id="pt" placeholder="e.g. New Construction, Remodel"/></div><div class="fg"><label class="fl">Contractor</label><input class="fi" type="text" id="pg" placeholder="GC / Builder name"/></div><div class="fg"><label class="fl">Designer</label><input class="fi" type="text" id="pd" placeholder="Designer name"/></div><div class="fg"><label class="fl">Permit Number (optional)</label><input class="fi" type="text" id="pm" placeholder="e.g. 23010-10000-12345"/></div><div class="ma"><button class="bc" onclick="closeM()">Cancel</button><button class="bp" onclick="createProj()">Create Project</button></div>`;setTimeout(()=>$('pn')?.focus(),80);}
async function createProj(){const name=$('pn').value.trim();if(!name)return;const{data,error}=await sb.from('bh_projects').insert({name,address:$('pa').value.trim(),project_type:$('pt').value.trim(),contractor:$('pg').value.trim(),designer:$('pd').value.trim(),permit_number:$('pm').value.trim(),created_by:st.user.initials}).select().single();if(error){toast('Error creating project');return;}st.projects.unshift(data);st.proj=data;st.tab='Initial Walkthrough';await loadTasks(data.id);addLog('created',`Created project "${name}"`,data.id);closeM();rMain();}
async function switchProj(pid){if(!pid){st.proj=null;rMain();return;}st.proj=st.projects.find(p=>p.id===pid)||null;st.tab='Initial Walkthrough';if(st.proj)await loadTasks(st.proj.id);rMain();}
function swTab(tab){st.tab=tab;rMain();}
async function markSold(){if(!st.proj)return;const sold=!st.proj.sold;await sb.from('bh_projects').update({sold,sold_date:sold?new Date().toISOString():null}).eq('id',st.proj.id);st.proj.sold=sold;const idx=st.projects.findIndex(p=>p.id===st.proj.id);if(idx>=0)st.projects[idx].sold=sold;addLog(sold?'sold':'reopened',`${sold?'Marked':'Reopened'} project "${st.proj.name}"`);if(sold){st.proj=null;}rMain();}
function doDel(){if(!st.proj)return;$('mbg').classList.add('open');$('mcc').innerHTML=`<div class="mt">Delete Project</div><div class="ms">Permanently delete "${st.proj.name}"? Cannot be undone.</div><div class="ma"><button class="bc" onclick="closeM()">Cancel</button><button class="bp" style="background:var(--red)" onclick="confirmDel()">Delete</button></div>`;}
async function confirmDel(){if(!st.proj)return;await sb.from('bh_projects').delete().eq('id',st.proj.id);st.projects=st.projects.filter(p=>p.id!==st.proj.id);delete st.taskCache[st.proj.id];st.proj=null;closeM();rMain();}
async function doSt(tab,idx,value){
  if(!st.proj)return;const k=tab+'|'+idx;const item=DATA[tab][idx];
  const isGCrow=item.o==='g';
  const updates={status:value};
  const blank=!value||value==='not-started'||value==='not-present'||value==='incomplete';
  if(!blank){updates.date_completed=fd();if(!isGCrow){updates.updated_by=st.user.initials;updates.updated_by_name=st.user.name;}addLog('update',`"${item.t}" → ${value} in ${tab}`);}
  else{updates.date_completed=null;if(!isGCrow){updates.updated_by='';updates.updated_by_name='';}}
  await upsertTask(st.proj.id,k,updates);
  const sel=document.querySelector(`#r${idx} select`);if(sel)sel.className=`ss ${value}`;
  const row=$('r'+idx);
  if(row&&!isGCrow){row.className='tr';if(isComplete(tab,idx))row.classList.add(item.o==='i'?'appr':'done');}
  updStamp(tab,idx);updProg();
}
async function doChk(tab,idx,checked){if(!st.proj)return;const k=tab+'|'+idx;const item=DATA[tab][idx];const updates={checked,status:checked?'checked':'default'};if(checked){updates.updated_by=st.user.initials;updates.updated_by_name=st.user.name;updates.date_completed=fd();addLog('checked',`Checked "${item.t}" in ${tab}`);}else{updates.updated_by='';updates.updated_by_name='';updates.date_completed=null;}await upsertTask(st.proj.id,k,updates);const row=$('r'+idx);if(row)row.classList.toggle('checked',checked);updStamp(tab,idx);updProg();}
async function saveDate(tab,idx,val){if(!st.proj)return;const k=tab+'|'+idx;await upsertTask(st.proj.id,k,{date_completed:val||null});toast('Date saved');}
async function saveNote(tab,idx,value){if(!st.proj)return;const k=tab+'|'+idx;await upsertTask(st.proj.id,k,{note:value});const btn=$('nb'+idx);if(btn){btn.textContent=value.trim()?'📝':'+ Note';btn.className='nb'+(value.trim()?' on':'');}}
function togN(idx){const a=$('na'+idx);if(!a)return;a.classList.toggle('open');if(a.classList.contains('open'))a.querySelector('textarea').focus();}
function updStamp(tab,idx){const sd=$('st'+idx);if(!sd)return;const k=tab+'|'+idx;const t=st.taskCache[st.proj?.id]?.[k]||{};const sv=t.status||'';const blank=!sv||sv==='not-started'||sv==='default';const item=DATA[tab][idx];const isGC=item.o==='g';if(t.updated_by&&!blank&&!isGC){sd.style.display='flex';sd.innerHTML=`<span class="stav">${t.updated_by}</span><span class="stnm">${t.updated_by_name||t.updated_by}</span><span class="stdt">· ${t.date_completed||''}</span><span class="stpill ${sv}">${sv.replace(/-/g,' ')}</span>`;}else{sd.style.display='none';sd.innerHTML='';}}
function updProg(){if(!st.proj)return;let total=0,done=0;TABS.forEach(tab=>{const c=countTab(tab);total+=c.total;done+=c.done;});const pct=total>0?Math.round((done/total)*100):0;const pf=$('pf'),pp=$('pp'),pc=$('pc');if(pf)pf.style.width=pct+'%';if(pp)pp.textContent=pct+'%';if(pc)pc.textContent=done+' / '+total;const tab=st.tab;const{done:td,total:tt}=countTab(tab);const dc=$('dc'),rm=$('rm');if(dc)dc.textContent=td;if(rm)rm.textContent=tt-td;}
function openEdit(){
  if(!st.proj)return;
  const pd=st.proj;
  $('mbg').classList.add('open');
  $('mcc').innerHTML=`<div class="mt">Edit Project</div><div class="ms">Update project details — changes save immediately.</div>
  <div class="fg"><label class="fl">Project Name</label><input class="fi" type="text" id="epn" value="${pd.name||''}"/></div>
  <div class="fg"><label class="fl">Address</label><input class="fi" type="text" id="epa" value="${pd.address||''}"/></div>
  <div class="fg"><label class="fl">Project Type</label><input class="fi" type="text" id="ept" value="${pd.project_type||''}"/></div>
  <div class="fg"><label class="fl">Contractor</label><input class="fi" type="text" id="epg" value="${pd.contractor||''}"/></div>
  <div class="fg"><label class="fl">Designer</label><input class="fi" type="text" id="epd" value="${pd.designer||''}"/></div>
  <div class="fg"><label class="fl">Permit Number</label><input class="fi" type="text" id="epm" value="${pd.permit_number||''}"/></div>
  <div class="ma"><button class="bc" onclick="closeM()">Cancel</button><button class="bp" onclick="saveEdit()">Save Changes</button></div>`;
  setTimeout(()=>$('epn')?.focus(),80);
}
async function saveEdit(){
  if(!st.proj)return;
  const updates={
    name:$('epn').value.trim(),
    address:$('epa').value.trim(),
    project_type:$('ept').value.trim(),
    contractor:$('epg').value.trim(),
    designer:$('epd').value.trim(),
    permit_number:$('epm').value.trim()
  };
  if(!updates.name){toast('Project name required');return;}
  const{error}=await sb.from('bh_projects').update(updates).eq('id',st.proj.id);
  if(error){toast('Error saving');return;}
  Object.assign(st.proj,updates);
  const idx=st.projects.findIndex(p=>p.id===st.proj.id);
  if(idx>=0)Object.assign(st.projects[idx],updates);
  addLog('edited',`Updated project details for "${updates.name}"`);
  toast('Project updated!');
  closeM();
  rMain();
}
async function syncLADBS(){
  if(!st.proj?.permit_number)return;
  const btn=$('sync-btn');
  const content=$('ladbs-content');
  if(!btn||!content)return;
  btn.textContent='⏳ Syncing...';
  btn.disabled=true;
  try{
    const permit=st.proj.permit_number;
    const parts=permit.split('-');
    if(parts.length!==3){content.innerHTML='<div style="color:var(--rdt)">Invalid permit format. Expected XXXXX-XXXXXX-XXXXX</div>';return;}
    const resp=await fetch(`/api/ladbs?permit=${encodeURIComponent(permit)}`);
    const data=await resp.json();
    if(data.error){
      content.innerHTML=`<div style="color:var(--rdt);padding:12px 0;">Error: ${data.error}. <a href="https://www.ladbsservices2.lacity.org/OnlineServices/?service=plr" target="_blank" style="color:var(--blu)">Open LADBS directly ↗</a></div>`;
      return;
    }
    let html='';
    // Inspector info
    if(data.inspector){
      html+=`<div style="background:var(--glp);border:1px solid rgba(184,135,42,0.2);border-radius:4px;padding:8px 12px;margin-bottom:14px;font-size:12px;color:var(--mid)">👷 Inspector: <strong>${data.inspector}</strong></div>`;
    }
    // Pending inspections
    if(data.pending&&data.pending.length>0){
      html+='<div style="font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--mut);font-weight:600;margin-bottom:6px">Pending Inspections</div>';
      html+='<div style="border:1px solid var(--brl);border-radius:4px;overflow:hidden;margin-bottom:16px">';
      data.pending.forEach((ins,i)=>{
        html+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:${i<data.pending.length-1?'1px solid var(--brl)':'none'};background:var(--abb)">
          <div style="flex:1;font-size:13px;color:var(--drk);font-weight:500">${ins.name}</div>
          <div style="font-size:11px;color:var(--mut);white-space:nowrap">${ins.date||'TBD'}</div>
          <div style="font-size:11px;background:var(--abb);color:var(--amb);padding:2px 8px;border-radius:10px;border:1px solid var(--amb);white-space:nowrap">Pending</div>
        </div>`;
      });
      html+='</div>';
    }
    // Inspection history
    if(data.history&&data.history.length>0){
      html+='<div style="font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--mut);font-weight:600;margin-bottom:6px">Inspection History</div>';
      html+='<div style="border:1px solid var(--brl);border-radius:4px;overflow:hidden;margin-bottom:16px">';
      data.history.forEach((ins,i)=>{
        const st2=ins.status.toLowerCase();
        const isPass=st2.includes('approv')&&!st2.includes('partial')&&!st2.includes('conditional');
        const isPartial=st2.includes('partial')||st2.includes('conditional');
        const isFail=st2.includes('fail')||st2.includes('correction');
        const bg=isPass?'var(--grb)':isPartial?'var(--abb)':isFail?'var(--rdb)':'var(--wht)';
        const clr=isPass?'var(--grt)':isPartial?'var(--amb)':isFail?'var(--rdt)':'var(--mut)';
        const bdclr=isPass?'var(--grn)':isPartial?'var(--amb)':isFail?'var(--red)':'var(--brd)';
        html+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:${i<data.history.length-1?'1px solid var(--brl)':'none'}">
          <div style="flex:1;font-size:13px;color:var(--drk)">${ins.name}</div>
          <div style="font-size:11px;color:var(--mut);white-space:nowrap">${ins.date}</div>
          <div style="font-size:11px;background:${bg};color:${clr};padding:2px 8px;border-radius:10px;border:1px solid ${bdclr};white-space:nowrap">${ins.status}</div>
          ${ins.inspector?`<div style="font-size:10px;color:var(--mut);white-space:nowrap">${ins.inspector}</div>`:''}
        </div>`;
      });
      html+='</div>';
    }
    if(!data.pending?.length&&!data.history?.length){
      html='<div style="color:var(--mut);padding:20px 0;">No inspection data found for this permit yet.</div>';
    }
    html+=`<div style="font-size:10px;color:var(--mut);margin-top:8px">Last synced: ${new Date(data.fetchedAt).toLocaleString()}</div>`;
    content.innerHTML=html;
  }catch(err){
    content.innerHTML=`<div style="color:var(--rdt);padding:12px 0;">Could not reach LADBS. <a href="https://www.ladbsservices2.lacity.org/OnlineServices/?service=plr" target="_blank" style="color:var(--blu)">Open LADBS directly ↗</a></div>`;
  }finally{
    if(btn){btn.textContent='🔄 Sync Now';btn.disabled=false;}
  }
}
function closeM(){const b=$('mbg');if(b)b.classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});
(async()=>{$('app').innerHTML=`<div class="lp"><div style="color:rgba(250,250,247,0.4);font-size:12px;letter-spacing:0.1em">Loading...</div></div>`;render();})();
</script>
